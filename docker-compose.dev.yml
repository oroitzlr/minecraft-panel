services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env.dev
    volumes:
      - /tmp/mc-agent.sock:/tmp/mc-agent.sock

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
