name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup WireGuard
        run: |
          sudo apt install -y wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo sed -i '/^DNS/d' /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

      - name: Get secrets from Vault
        run: |
          VAULT_ADDR=http://10.0.0.1:8200
          VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}
          CICD=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" $VAULT_ADDR/v1/secret/data/cicd | jq -r '.data.data')
          echo "DOCKERHUB_USERNAME=$(echo $CICD | jq -r '.DOCKERHUB_USERNAME')" >> $GITHUB_ENV
          echo "DOCKERHUB_TOKEN=$(echo $CICD | jq -r '.DOCKERHUB_TOKEN')" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: oroitzlr/mc-frontend:latest
          build-args: |
            VITE_API_URL=https://mc-api.oroitzlagoramos.com
            VITE_WS_URL=wss://mc-api.oroitzlagoramos.com

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: oroitzlr/mc-backend:latest

      - name: Build mc-agent
        run: |
          cd agent
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o mc-agent .

      - name: Upload mc-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-agent
          path: agent/mc-agent

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Download mc-agent artifact
        uses: actions/download-artifact@v4
        with:
          name: mc-agent
          path: ./

      - name: Setup WireGuard
        run: |
          sudo apt install -y wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
          sudo sed -i '/^DNS/d' /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

      - name: Get secrets from Vault
        run: |
          VAULT_ADDR=http://10.0.0.1:8200
          VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}
          CICD=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" $VAULT_ADDR/v1/secret/data/cicd | jq -r '.data.data')

          echo "VPS_HOST=$(echo $CICD | jq -r '.VPS_HOST')" >> $GITHUB_ENV
          echo "VPS_USER=$(echo $CICD | jq -r '.VPS_USER')" >> $GITHUB_ENV
          echo "VPS_PORT=$(echo $CICD | jq -r '.VPS_PORT')" >> $GITHUB_ENV

          EOF_MARKER=$(openssl rand -hex 8)
          echo "VPS_SSH_KEY<<$EOF_MARKER" >> $GITHUB_ENV
          echo $CICD | jq -r '.VPS_SSH_KEY' >> $GITHUB_ENV
          echo "$EOF_MARKER" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ env.VPS_PORT }} ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Stop mc-agent before SCP
        run: |
          ssh -p ${{ env.VPS_PORT }} -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "sudo systemctl stop mc-agent"

      - name: SCP mc-agent
        run: |
          scp -P ${{ env.VPS_PORT }} -i ~/.ssh/id_ed25519 ./mc-agent ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/home/deploy/minecraft/agent/mc-agent

      - name: SSH → deploy
        run: |
          ssh -p ${{ env.VPS_PORT }} -i ~/.ssh/id_ed25519 ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'SSHEOF'
            PANEL=$(curl -s -H "X-Vault-Token: $(cat ~/.vault-token)" http://10.0.0.1:8200/v1/secret/data/mc-panel | jq -r '.data.data')

            MONGO_ROOT_PASSWORD=$(echo $PANEL | jq -r '.MONGO_ROOT_PASSWORD')
            JWT_SECRET=$(echo $PANEL | jq -r '.JWT_SECRET')
            RCON_PASSWORD=$(echo $PANEL | jq -r '.RCON_PASSWORD')

            printf "MONGO_ROOT_PASSWORD=%s\nJWT_SECRET=%s\nRCON_PASSWORD=%s\n" \
              "$MONGO_ROOT_PASSWORD" "$JWT_SECRET" "$RCON_PASSWORD" > ~/mc-panel/.env

            chmod +x ~/minecraft/agent/mc-agent
            sudo systemctl restart mc-agent
            sleep 2

            cd ~/mc-panel
            docker compose pull
            docker compose up -d
            docker compose up -d --force-recreate backend

            echo "Deploy OK — agent: $(sudo systemctl is-active mc-agent)"
          SSHEOF